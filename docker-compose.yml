version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dativus_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ───────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Spring Boot 서버 ────────────────────────────────────
  spring:
    build: ./server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      FASTAPI_BASE_URL: http://fastapi:8000
    depends_on:
      db:
        condition: service_healthy

  # ── FastAPI AI 서버 ─────────────────────────────────────
  fastapi:
    build: ./Dativus_Ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS512}
      GROQ_API_KEY: ${GROQ_API_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: dativus_db
      DB_USER: postgres
      SPRING_BASE_URL: http://spring:8080
      ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - chroma_data:/app/chroma_storage
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ── React 프론트엔드 (Nginx) ────────────────────────────
  frontend:
    build:
      context: ./dativus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - spring
      - fastapi

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
  hf_cache:
