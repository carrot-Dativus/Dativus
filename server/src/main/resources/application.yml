spring:
  # 💡 새롭게 추가된 파일 업로드 용량 해제 설정 (50MB)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  config:
    import: optional:file:.env
  datasource:
    url: jdbc:postgresql://localhost:5432/dativus_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false



jwt:
  secret: ${JWT_SECRET}
  expiration_time: 3600000 # 60분 (밀리초 단위)

fastapi:
  base:
    url: ${FASTAPI_BASE_URL:http://127.0.0.1:8000}